<!doctype html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>EKS GPU Operations — Agentic AI Platform Training</title>
<script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>

<style>
  html,body{margin:0;padding:0;background:#030712;color:#f9fafb;height:100%;width:100%;overflow:hidden;font-family:-apple-system,'Pretendard',BlinkMacSystemFont,'Segoe UI',sans-serif}
  #root{height:100vh;width:100vw;overflow:hidden}
  /* 16:9 fixed stage 1280x720, scaled via JS transform */
  .stage-viewport{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;background:#030712}
  .stage{position:relative;width:1280px;height:720px;transform-origin:center center;background:#030712;overflow:hidden;box-shadow:0 0 0 1px #1f2937}

  .fade-in{animation:fadein .35s ease both}
  @keyframes fadein{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
  .grad-text{background:linear-gradient(135deg,#76b900,#60a5fa,#a78bfa);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
  .grad-amber{background:linear-gradient(135deg,#f59e0b,#f472b6);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
  .chip{display:inline-flex;align-items:center;gap:.35rem;padding:.15rem .5rem;border-radius:9999px;font-size:11px;font-weight:600;line-height:1.25}
  .divider{height:1px;background:linear-gradient(90deg,transparent,#334155,transparent)}
  .scrollbar::-webkit-scrollbar{width:6px;height:6px}
  .scrollbar::-webkit-scrollbar-thumb{background:#374151;border-radius:3px}
  kbd{display:inline-block;padding:.05rem .35rem;border-radius:4px;border:1px solid #374151;background:#0f172a;font-size:11px;color:#cbd5e1;font-family:ui-monospace,monospace}
  /* stage-local typography — prevents overflow at 1280x720 */
  .stage h1{line-height:1.1}
  .stage h2,.stage h3{line-height:1.2}
  .stage p{line-height:1.5}
  .stage table{font-size:12px}
  .stage table th{font-size:10px;letter-spacing:.05em}
  .stage td,.stage th{padding:6px 10px !important}
  .stage pre{font-size:11px;line-height:1.45}
  .stage .card-body{font-size:12px;line-height:1.55}
</style>
</head>
<body>
<div id="root"></div>

<script type="text/babel" data-presets="react">
const { useState, useEffect, useCallback, useMemo } = React;

// ===== Shared components =====
function Frame({ children }) {
  return (
    <div className="stage-inner fade-in">
      {children}
    </div>
  );
}

function Header({ eyebrow, title, sub, accent='#76b900', compact=false }) {
  return (
    <div className={compact ? 'mb-3' : 'mb-4'}>
      {eyebrow && (
        <div className="font-semibold tracking-widest uppercase mb-1"
             style={{color: accent, fontSize: 11, letterSpacing: '.14em'}}>{eyebrow}</div>
      )}
      <h1 className={`font-extrabold grad-text ${compact ? 'text-3xl' : 'text-4xl'}`}
          style={{lineHeight: 1.1}}>{title}</h1>
      {sub && <p className="text-gray-400 mt-2" style={{fontSize: 14, lineHeight: 1.5}}>{sub}</p>}
    </div>
  );
}

function Card({ title, icon, color='blue', children, className='' }) {
  const map = {
    blue: 'border-blue-500/30 bg-blue-500/5',
    green: 'border-emerald-500/30 bg-emerald-500/5',
    amber: 'border-amber-500/30 bg-amber-500/5',
    purple: 'border-purple-500/30 bg-purple-500/5',
    rose: 'border-rose-500/30 bg-rose-500/5',
    slate: 'border-slate-600/40 bg-slate-800/40',
    lime: 'border-lime-500/30 bg-lime-500/5',
  };
  const textMap = {
    blue:'text-blue-400', green:'text-emerald-400', amber:'text-amber-400',
    purple:'text-purple-400', rose:'text-rose-400', slate:'text-slate-300', lime:'text-lime-400'
  };
  return (
    <div className={`rounded-lg border p-3 ${map[color]} ${className}`}>
      <div className="flex items-center gap-2 mb-2">
        {icon && <span className={`${textMap[color]}`} style={{fontSize: 15}}>{icon}</span>}
        <h3 className={`font-bold ${textMap[color]}`} style={{fontSize: 13}}>{title}</h3>
      </div>
      <div className="card-body text-gray-200">{children}</div>
    </div>
  );
}

function Pill({ text, tone='slate' }) {
  const map = {
    slate:'bg-slate-700/50 text-slate-200',
    green:'bg-emerald-500/20 text-emerald-300',
    amber:'bg-amber-500/20 text-amber-300',
    rose:'bg-rose-500/20 text-rose-300',
    blue:'bg-blue-500/20 text-blue-300',
    purple:'bg-purple-500/20 text-purple-300',
    lime:'bg-lime-500/20 text-lime-300',
  };
  return <span className={`chip ${map[tone]}`}>{text}</span>;
}

function Code({ children, lang='yaml' }) {
  return (
    <pre className="mono text-xs md:text-sm bg-black/60 border border-slate-700/60 rounded-lg p-4 overflow-auto scrollbar whitespace-pre">
      <code>{children}</code>
    </pre>
  );
}

function Table({ headers, rows, highlight=[] }) {
  return (
    <div className="overflow-auto scrollbar rounded-lg border border-slate-700/60">
      <table className="w-full text-sm">
        <thead className="bg-slate-800/70">
          <tr>{headers.map((h,i)=>(
            <th key={i} className="text-left px-3 py-2 text-xs uppercase tracking-wider text-gray-300 font-semibold">{h}</th>
          ))}</tr>
        </thead>
        <tbody>
          {rows.map((r,i)=>(
            <tr key={i} className={`${i%2? 'bg-slate-900/40':'bg-slate-900/20'} ${highlight.includes(i)?'bg-emerald-900/30':''}`}>
              {r.map((c,j)=>(
                <td key={j} className="px-3 py-2 text-gray-200 align-top">{c}</td>
              ))}
            </tr>
          ))}
        </tbody>
      </table>
    </div>
  );
}

// Simple SVG flow diagram
function Flow({ nodes, edges, w=900, h=380 }) {
  const byId = Object.fromEntries(nodes.map(n => [n.id, n]));
  return (
    <svg viewBox={`0 0 ${w} ${h}`} className="w-full max-w-5xl mx-auto">
      <defs>
        <marker id="arr" viewBox="0 0 10 10" refX="8" refY="5"
                markerWidth="6" markerHeight="6" orient="auto-start-reverse">
          <path d="M0,0 L10,5 L0,10 Z" fill="#94a3b8"/>
        </marker>
      </defs>
      {edges.map((e, i)=>{
        const f = byId[e.from], t = byId[e.to]; if (!f || !t) return null;
        const x1=f.x+f.w/2, y1=f.y+f.h, x2=t.x+t.w/2, y2=t.y;
        const mx=(x1+x2)/2, my=(y1+y2)/2;
        const path = `M ${x1} ${y1} C ${x1} ${my} ${x2} ${my} ${x2} ${y2}`;
        return (
          <g key={i}>
            <path d={path} fill="none" stroke="#94a3b8" strokeWidth="1.6" markerEnd="url(#arr)" strokeDasharray={e.dashed?'5 4':''}/>
            {e.label && <text x={mx} y={my-6} fontSize="11" fill="#cbd5e1" textAnchor="middle">{e.label}</text>}
          </g>
        );
      })}
      {nodes.map(n=>(
        <g key={n.id}>
          <rect x={n.x} y={n.y} width={n.w} height={n.h} rx="10"
                fill={n.fill || '#0f172a'} stroke={n.stroke || '#334155'} strokeWidth="1.6"/>
          <text x={n.x+n.w/2} y={n.y+n.h/2+5} fontSize="13" fill={n.textColor || '#f1f5f9'}
                textAnchor="middle" fontWeight="600">{n.label}</text>
          {n.sub && <text x={n.x+n.w/2} y={n.y+n.h/2+22} fontSize="11" fill="#94a3b8" textAnchor="middle">{n.sub}</text>}
        </g>
      ))}
    </svg>
  );
}

// ===== Slides =====
const slides = [
  // 1. Title
  () => (
    <Frame>
      <div className="flex-1 flex flex-col justify-center">
        <div className="mb-4 flex items-center gap-2">
          <Pill text="AGENTIC AI PLATFORM" tone="lime"/>
          <Pill text="TRAINING" tone="slate"/>
          <Pill text="2026.05" tone="slate"/>
        </div>
        <h1 className="text-6xl md:text-7xl font-extrabold leading-[1.05] grad-text mb-6">
          EKS GPU Operations
        </h1>
        <p className="text-2xl text-gray-300 font-light max-w-3xl">
          NVIDIA · AWS Neuron · Karpenter · DRA · GPU Operator — 프로덕션 Agentic 플랫폼을 위한 GPU 인프라 운영 가이드
        </p>
        <div className="mt-10 grid grid-cols-2 md:grid-cols-4 gap-3 max-w-3xl">
          <Pill text="EKS Auto Mode" tone="amber"/>
          <Pill text="Karpenter v1.2+" tone="blue"/>
          <Pill text="GPU Operator v25.10" tone="green"/>
          <Pill text="DRA K8s 1.34 GA" tone="purple"/>
          <Pill text="vLLM v0.18+" tone="lime"/>
          <Pill text="Trainium2 / Inferentia2" tone="amber"/>
          <Pill text="Dynamo v1.0" tone="green"/>
          <Pill text="CRIU Preview" tone="rose"/>
        </div>
        <div className="mt-14 text-sm text-gray-500">
          20 slides · 이전/다음: <kbd>←</kbd> <kbd>→</kbd> · 첫 슬라이드: <kbd>Home</kbd>
        </div>
      </div>
    </Frame>
  ),

  // 2. Why GPU Operations
  () => (
    <Frame>
      <Header eyebrow="Why This Matters"
              title="GPU 운영이 LLM 플랫폼의 단일 최대 비용"
              sub="GPU는 EKS 상위 워크로드의 70–90% 비용을 차지합니다. 노드 전략·파티셔닝·오토스케일링의 작은 오판이 월 수만 달러 낭비로 이어집니다."/>
      <div className="grid grid-cols-3 gap-5">
        <Card title="1. 노드 전략" icon="🖥️" color="blue">
          Auto Mode vs Karpenter vs MNG vs Hybrid Node — DRA 요구사항·MIG·Spot·온프레미스 통합 여부로 선택이 갈립니다.
        </Card>
        <Card title="2. 파티셔닝" icon="🔪" color="amber">
          H100을 7B 모델 단독으로 쓰면 GPU 80%가 유휴. MIG·Time-Slicing으로 활용률 3배 이상 개선 가능합니다.
        </Card>
        <Card title="3. 스케일링" icon="📈" color="green">
          GPU 사용률이 아닌 <b>KV Cache·TTFT·Queue</b>가 LLM 서빙의 민감 시그널입니다. KEDA + Karpenter 2단 체인.
        </Card>
        <Card title="4. 관측" icon="📡" color="purple">
          DCGM Exporter · Neuron Monitor가 Prometheus에 연결되지 않으면 오토스케일·SLO·비용 분석 모두 무너집니다.
        </Card>
        <Card title="5. 비용" icon="💰" color="rose">
          Spot 85–94% 절감, Consolidation 20–30%, 시간대 스케줄링 30–40%. 조합 시 총 85%까지 절감 가능.
        </Card>
        <Card title="6. 미래 대비" icon="🔮" color="lime">
          P6e-GB200·trn2 Ultra·CRIU·DRA GA — 로드맵을 읽지 않으면 내년에 다시 재설계합니다.
        </Card>
      </div>
    </Frame>
  ),

  // 3. 네 가지 노드 타입
  () => (
    <Frame>
      <Header eyebrow="Foundation" title="EKS GPU 노드 4가지 타입"
              sub="하나의 클러스터에서 이 네 타입을 동시에 운영해 워크로드 특성에 정확히 맞춥니다."/>
      <Table
        headers={['타입','관리 주체','스케일링','Custom AMI','MIG','DRA','권장 용도']}
        rows={[
          ['EKS Auto Mode','AWS 완전 관리','자동','❌','❌','❌','단순 추론·시스템·비GPU'],
          ['Karpenter','Self-Managed','자동(NodePool)','✅','✅','❌','고급 GPU·Spot·MIG'],
          ['Managed Node Group','AWS 관리','수동/제한','✅','✅','✅','DRA·P6e-GB200'],
          ['Hybrid Node','On-Premises','수동','✅','✅','✅','온프레미스 GPU 팜 통합'],
        ]}
        highlight={[1,2]}
      />
      <div className="mt-6 grid grid-cols-2 gap-5">
        <Card title="핵심 원칙" color="green" icon="🎯">
          하나의 클러스터 = 여러 노드 타입. 시스템은 Auto Mode, 고급 GPU는 Karpenter, DRA는 MNG로 분리해 각 영역의 최적점을 조합합니다.
        </Card>
        <Card title="주의" color="amber" icon="⚠️">
          Auto Mode + MNG 하이브리드는 2026.04 기준 MNG 생성이 <b>CREATING 30분+ 멈춤</b>. 대형 GPU는 Standard Mode로 시작하세요.
        </Card>
      </div>
    </Frame>
  ),

  // 4. Auto Mode 장단점
  () => (
    <Frame>
      <Header eyebrow="Node Strategy — Auto Mode" title="EKS Auto Mode GPU 지원과 제약"
              sub="AWS가 드라이버·Container Toolkit·Device Plugin까지 사전 설치합니다. 단 NodeClass는 Read-Only."/>
      <div className="grid grid-cols-2 gap-5 mb-5">
        <Card title="자동 제공" icon="✅" color="green">
          <ul className="space-y-1 list-disc list-inside">
            <li>NVIDIA GPU 드라이버 (AWS 관리)</li>
            <li>NVIDIA Container Toolkit (CDI)</li>
            <li>NVIDIA Device Plugin</li>
            <li><span className="mono">nvidia.com/gpu</span> 리소스 즉시 사용</li>
          </ul>
        </Card>
        <Card title="구조적 제약" icon="🚧" color="rose">
          <ul className="space-y-1 list-disc list-inside">
            <li>MIG 파티셔닝 불가 (NodeClass read-only)</li>
            <li>Custom AMI·드라이버 버전 핀 불가</li>
            <li>SSH/SSM 디버깅 불가</li>
            <li>DRA 미지원 (내부 Karpenter 기반)</li>
            <li>강제 종료 불가 (<span className="mono">TerminateInstances</span> 차단)</li>
          </ul>
        </Card>
      </div>
      <Card title="GPU Operator는 여전히 설치 가능 — Device Plugin만 비활성화 패턴" color="blue" icon="🧩">
        <div className="grid grid-cols-2 gap-4 mt-2">
          <Code lang="yaml">{`# NodePool 레이블로 내장 DP만 비활성화
labels:
  nvidia.com/gpu.deploy.device-plugin: "false"`}</Code>
          <Code lang="yaml">{`# Helm Values — AMI 내장이므로 false
driver: { enabled: false }
toolkit: { enabled: false }
devicePlugin: { enabled: true }
dcgmExporter: { enabled: true }
nfd: { enabled: true }
gfd: { enabled: true }`}</Code>
        </div>
        <div className="mt-3 text-gray-300">
          KAI Scheduler·Run:ai는 GPU Operator의 <b>ClusterPolicy CRD</b>에 의존합니다. Auto Mode에서도 GPU Operator를 설치해야 하는 핵심 이유입니다.
        </div>
      </Card>
    </Frame>
  ),

  // 5. Karpenter NodePool
  () => (
    <Frame>
      <Header eyebrow="Node Strategy — Karpenter" title="Karpenter GPU NodePool"
              sub="자동 스케일링 장점은 유지하면서 MIG·Custom AMI·Spot·GPU Operator를 완전히 활용하는 최적의 균형점."/>
      <div className="grid grid-cols-5 gap-3 mb-4">
        {[
          ['인스턴스 다양성','p4d·p5·p5en·g6e'],
          ['Spot/On-Demand','capacity-type 혼합'],
          ['Consolidation','유휴 GPU 자동 정리'],
          ['Taint 격리','nvidia.com/gpu'],
          ['MIG Manager','GPU Operator 연동'],
        ].map((x,i)=>(
          <div key={i} className="rounded-lg border border-slate-700/60 bg-slate-800/40 p-3">
            <div className="text-xs text-blue-400 font-semibold mb-1">{x[0]}</div>
            <div className="text-sm text-gray-200">{x[1]}</div>
          </div>
        ))}
      </div>
      <Code lang="yaml">{`apiVersion: karpenter.sh/v1
kind: NodePool
metadata: { name: gpu-inference }
spec:
  template:
    metadata: { labels: { node-type: gpu-inference, gpu-operator: enabled } }
    spec:
      requirements:
        - { key: node.kubernetes.io/instance-type, operator: In,
            values: [p5.48xlarge, g6e.12xlarge, g5.12xlarge] }

      taints:
        - { key: nvidia.com/gpu, effect: NoSchedule, value: "true" }

    consolidationPolicy: WhenEmpty
    consolidateAfter: 5m
  limits: { cpu: "1000", memory: "4000Gi", nvidia.com/gpu: "32" }`}</Code>
      <div className="mt-4">
        <Card title="설계 포인트" color="amber" icon="🧠">
          <ul className="space-y-1 list-disc list-inside">
            <li><b>limits.nvidia.com/gpu</b> — 클러스터 전체 GPU 상한으로 비용 폭주 방지</li>
            <li><b>consolidateAfter</b> 짧게 — GPU 비용이 높으므로 공격적 정리 (30s–5m)</li>
            <li>Spot 우선, On-Demand fallback — p5·p5en Spot 기준 <b>85–94% 절감</b></li>

      <Header eyebrow="Node Strategy — DRA" title="DRA는 Karpenter·Auto Mode와 호환되지 않습니다"
              sub="K8s 1.34 GA. GPU 메모리 세밀 할당·CEL 속성 매칭·NVLink 토폴로지 인식. 단, 노드 프로비저닝 제약 존재."/>
      <div className="grid grid-cols-2 gap-5 mb-5">
        <Table
          headers={['노드 프로비저닝','DRA 호환']}
          rows={[
            ['Managed Node Group','✅ 지원 (권장)'],
            ['Self-Managed Node Group','✅ 지원'],
            ['Karpenter','❌ 미지원 (ResourceClaim Pod skip)'],
            ['EKS Auto Mode','❌ 미지원 (내부 Karpenter)'],

          highlight={[0]}

          <ol className="list-decimal list-inside space-y-1">
            <li>DRA Driver가 GPU를 탐지한 <b>후에</b> ResourceSlice 발행</li>
            <li>Karpenter는 노드 <b>생성 전에</b> 요구사항 시뮬레이션 필요</li>
            <li>CEL 표현식 평가에 필요한 속성이 없음 → skip</li>
          </ol>
          <div className="mt-2 text-gray-400 text-xs">Cluster Autoscaler는 DRA 해석 없이 "Pending → MNG +1" 단순 판단이므로 동작.</div>
        </Card>
      </div>
      <Card title="현시점 권장 — 2026.04" color="green" icon="✨">
        대부분의 LLM 서빙은 <b>Karpenter + GPU Operator (Device Plugin + MIG)</b>로 충분합니다. Karpenter의 빠른 스케일아웃이 MNG + CA보다 LLM SLO에 유리. <b>P6e-GB200 도입 또는 Karpenter DRA GA</b> 전환 시점까지 이 구성을 유지하세요.
      </Card>
    </Frame>
  ),

  // 7. Model size vs cost
  () => (
    <Frame>
      <Header eyebrow="Cost Impact" title="모델 크기별 GPU 낭비와 MIG의 효과"
              sub="p5.48xlarge H100×8 기준 월 약 $98,000. 모델이 작을수록 Auto Mode 낭비가 커집니다."/>
      <Table
        headers={['구성','7B 인스턴스 수','GPU 사용량','활용률','인스턴스당 실효 비용']}

// ===== App =====
function Minimap({ n, current, onGo }) {
  return (
    <div className="fixed bottom-5 left-1/2 -translate-x-1/2 flex items-center gap-1 px-3 py-2 bg-slate-900/80 border border-slate-700 rounded-full backdrop-blur">
      {Array.from({length:n}).map((_,i)=>(
        <button key={i} onClick={()=>onGo(i)}
          className={`w-2.5 h-2.5 rounded-full transition-all ${
            i===current ? 'bg-emerald-400 scale-125'
            : i<current ? 'bg-emerald-500/40'
            : 'bg-slate-600 hover:bg-slate-400'
          }`}
          aria-label={`Slide ${i+1}`}/>
      ))}
    </div>
  );
}

function Nav({ current, total, onPrev, onNext }) {
  return (
    <div className="fixed top-5 right-6 flex items-center gap-3">
      <div className="text-xs text-gray-400 mono">
        {String(current+1).padStart(2,'0')} / {String(total).padStart(2,'0')}
      </div>
      <button onClick={onPrev}
              className="w-9 h-9 rounded-full bg-slate-800 border border-slate-700 text-gray-300 hover:bg-slate-700 disabled:opacity-30"
              disabled={current===0}>‹</button>
      <button onClick={onNext}
              className="w-9 h-9 rounded-full bg-emerald-600 border border-emerald-500 text-white hover:bg-emerald-500 disabled:opacity-30"
              disabled={current===total-1}>›</button>
    </div>
  );
}

function App() {
  const [current, setCurrent] = useState(0);
  const go = useCallback((i)=> setCurrent(Math.max(0, Math.min(slides.length-1, i))),[]);
  const prev = useCallback(()=>go(current-1),[current,go]);
  const next = useCallback(()=>go(current+1),[current,go]);

  useEffect(()=>{
    const onKey = (e)=>{
      if (e.key==='ArrowRight'||e.key===' '||e.key==='PageDown') next();
      else if (e.key==='ArrowLeft'||e.key==='PageUp') prev();
      else if (e.key==='Home') go(0);
      else if (e.key==='End') go(slides.length-1);
    };
    window.addEventListener('keydown', onKey);
    return ()=>window.removeEventListener('keydown', onKey);
  },[next,prev,go]);

  const S = slides[current];
  return (
    <div className="relative">
      <S key={current}/>
      <Nav current={current} total={slides.length} onPrev={prev} onNext={next}/>
      <Minimap n={slides.length} current={current} onGo={go}/>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
