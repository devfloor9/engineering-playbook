# AIPerf Benchmark — Sequence Distribution Mode
apiVersion: batch/v1
kind: Job
metadata:
  name: benchmark-seq-dist
  namespace: dynamo-system
  labels:
    app.kubernetes.io/part-of: nvidia-dynamo
    benchmark-mode: seq-dist
spec:
  backoffLimit: 1
  template:
    spec:
      restartPolicy: Never
      containers:
        - name: aiperf
          image: nvcr.io/nvidia/ai-dynamo/aiperf:0.9.1
          command:
            - bash
            - -c
            - |
              for dist in "uniform" "zipf" "lognormal"; do
                echo "==> Running seq-dist: distribution=${dist}"
                aiperf benchmark \
                  --target "http://vllm-aggregated:8000/v1" \
                  --model "${MODEL_NAME}" \
                  --mode seq-dist \
                  --distribution "${dist}" \
                  --concurrency "${CONCURRENCY}" \
                  --min-input-len 128 \
                  --max-input-len 4096 \
                  --min-output-len 64 \
                  --max-output-len 2048 \
                  --duration "${DURATION}" \
                  --output-dir "/results/seq-dist/${dist}" \
                  --output-format json
              done
          env:
            - name: MODEL_NAME
              value: "Qwen3-30B-A3B-FP8"
            - name: CONCURRENCY
              value: "16"
            - name: DURATION
              value: "180"
          volumeMounts:
            - name: results
              mountPath: /results
          resources:
            requests:
              cpu: "4"
              memory: 8Gi
      volumes:
        - name: results
          persistentVolumeClaim:
            claimName: dynamo-shared-storage
      tolerations:
        - key: "eks.amazonaws.com/compute-type"
          operator: "Exists"
