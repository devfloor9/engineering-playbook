# AIPerf Benchmark — Concurrency Sweep Mode
apiVersion: batch/v1
kind: Job
metadata:
  name: benchmark-sweep
  namespace: dynamo-system
  labels:
    app.kubernetes.io/part-of: nvidia-dynamo
    benchmark-mode: sweep
spec:
  backoffLimit: 1
  template:
    spec:
      restartPolicy: Never
      containers:
        - name: aiperf
          image: nvcr.io/nvidia/ai-dynamo/aiperf:0.9.1
          command:
            - bash
            - -c
            - |
              for c in ${CONCURRENCY_LIST}; do
                echo "==> Running sweep: concurrency=${c}"
                aiperf benchmark \
                  --target "http://vllm-aggregated:8000/v1" \
                  --model "${MODEL_NAME}" \
                  --mode sweep \
                  --concurrency "${c}" \
                  --input-seq-len "${ISL}" \
                  --output-seq-len "${OSL}" \
                  --duration "${DURATION}" \
                  --output-dir "/results/sweep/c${c}" \
                  --output-format json
              done
          env:
            - name: MODEL_NAME
              value: "Qwen3-30B-A3B-FP8"
            - name: CONCURRENCY_LIST
              value: "1 2 4 8 16 32 64"
            - name: ISL
              value: "1024"
            - name: OSL
              value: "512"
            - name: DURATION
              value: "120"
          volumeMounts:
            - name: results
              mountPath: /results
          resources:
            requests:
              cpu: "4"
              memory: 8Gi
      volumes:
        - name: results
          persistentVolumeClaim:
            claimName: dynamo-shared-storage
      tolerations:
        - key: "eks.amazonaws.com/compute-type"
          operator: "Exists"
