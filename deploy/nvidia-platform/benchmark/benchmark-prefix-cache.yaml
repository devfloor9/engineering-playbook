# AIPerf Benchmark — Prefix Cache Mode
apiVersion: batch/v1
kind: Job
metadata:
  name: benchmark-prefix-cache
  namespace: dynamo-system
  labels:
    app.kubernetes.io/part-of: nvidia-dynamo
    benchmark-mode: prefix-cache
spec:
  backoffLimit: 1
  template:
    spec:
      restartPolicy: Never
      containers:
        - name: aiperf
          image: nvcr.io/nvidia/ai-dynamo/aiperf:0.9.1
          command:
            - bash
            - -c
            - |
              for ratio in "0.0" "0.25" "0.5" "0.75" "1.0"; do
                echo "==> Running prefix-cache: hit_ratio=${ratio}"
                aiperf benchmark \
                  --target "http://vllm-aggregated:8000/v1" \
                  --model "${MODEL_NAME}" \
                  --mode prefix-cache \
                  --prefix-hit-ratio "${ratio}" \
                  --concurrency "${CONCURRENCY}" \
                  --input-seq-len "${ISL}" \
                  --output-seq-len "${OSL}" \
                  --duration "${DURATION}" \
                  --output-dir "/results/prefix-cache/ratio_${ratio}" \
                  --output-format json
              done
          env:
            - name: MODEL_NAME
              value: "Qwen3-30B-A3B-FP8"
            - name: CONCURRENCY
              value: "16"
            - name: ISL
              value: "2048"
            - name: OSL
              value: "512"
            - name: DURATION
              value: "120"
          volumeMounts:
            - name: results
              mountPath: /results
          resources:
            requests:
              cpu: "4"
              memory: 8Gi
      volumes:
        - name: results
          persistentVolumeClaim:
            claimName: dynamo-shared-storage
      tolerations:
        - key: "eks.amazonaws.com/compute-type"
          operator: "Exists"
